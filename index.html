    <style>
        /* Định dạng cho nút bấm xem lời giải */
        .nut-xem-loi-giai {
            background: none;
            border: none;
            color: #2d6a4f;
            padding: 0;
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            outline: none;
            user-select: none;
        }

        .nut-xem-loi-giai:hover {
            color: #40916c;
        }

        /* Hiệu ứng xoay mũi tên mượt mà */
        .nut-xem-loi-giai .mui-ten {
            display: inline-block;
            font-size: 10px;
            transition: transform 0.25s ease;
        }

        /* Kỹ thuật CSS Grid tạo chuyển động chiều cao (height) từ 0 đến tự động mượt mà */
        .vung-chuyen-dong {
            display: grid;
            grid-template-rows: 0fr; /* Mặc định ẩn bằng cách ép hàng về 0 */
            transition: grid-template-rows 0.3s ease-out, opacity 0.25s ease-out;
            opacity: 0;
        }

        /* Bắt buộc phải có thuộc tính này để phần tử con bên trong co giãn chính xác */
        .noi-dung-ben-trong {
            overflow: hidden;
            min-height: 0; 
        }

        /* --- TRẠNG THÁI KHI NGƯỜI DÙNG BẤM MỞ --- */

        /* Xoay mũi tên chúi xuống */
        .cum-loi-giai.da-mo .nut-xem-loi-giai .mui-ten {
            transform: rotate(90deg);
        }

        /* Xổ nội dung xuống mượt mà và làm hiện rõ chữ */
        .cum-loi-giai.da-mo .vung-chuyen-dong {
            grid-template-rows: 1fr; /* Mở rộng chiều cao vừa vặn với nội dung tự động */
            opacity: 1;

        :root {

        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; background: var(--bg-gradient); 
            min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center;
        }

        .container { 
            width: 95%; max-width: 1000px; background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: 40px;
        }

        h1 { text-align: center; color: var(--primary); font-size: 32px; margin-bottom: 10px; letter-spacing: 1px; }
        .sub-title { text-align: center; color: var(--secondary); font-size: 16px; margin-bottom: 30px; font-style: italic; }

        .tabs-khoi { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .btn-tab { 
            padding: 15px 35px; cursor: pointer; background: linear-gradient(45deg, #2d6a4f, #52b788); 
            color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn-tab:active { transform: scale(0.95); }
        .btn-tab.active-tab { background: linear-gradient(45deg, #ff9f1c, #f77f00); box-shadow: 0 5px 15px rgba(247,127,0,0.4); }

        .vung-mon-hoc {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; margin-top: 20px; padding: 20px; background: #f7fdf9; border-radius: 20px; border: 1px dashed var(--secondary);
        }
        .btn-mon {
            padding: 15px; cursor: pointer; background: white; color: var(--primary); border: 2px solid #b7e4c7;
            border-radius: 15px; font-weight: bold; font-size: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .btn-mon:hover { background: var(--light); border-color: var(--secondary); transform: translateY(-2px); }
        .btn-mon:active { transform: translateY(0); }

        /* --- CSS TIÊU CHUẨN TRONG BÀI HỌC --- */
        .khoi-bai-hoc { margin-bottom: 30px; margin-left: 10px; border-bottom: 2px dashed #ddd; padding-bottom: 20px;}

        .hop-lien-ket-mo-rong a:hover { text-decoration: underline; }
    </style>
</head>

        document.getElementById('tab-' + tenLop).classList.add('active-tab');

        document.querySelectorAll('.vung-lop-content').forEach(vung => vung.style.display = 'none');
        document.getElementById('vung-' + tenLop).style.display = 'block';
    }

    function hienThiKhungPoup(maMon, maLop) {
        if (!khoDuLieuHocTap[maLop] || !khoDuLieuHocTap[maLop][maMon] || khoDuLieuHocTap[maLop][maMon].chuongList.length === 0) {
            alert("Đang soạn thảo môn học này, bạn quay lại sau nhé! 🛠️");
            return;
        }

        const duLieuMon = khoDuLieuHocTap[maLop][maMon];
        document.getElementById('popup-tieude').innerHTML = duLieuMon.tenMon;

        let htmlNoiDung = '';
        duLieuMon.chuongList.forEach(chuong => {
            htmlNoiDung += `<h3 style="color: #ff9f1c; background: #f7fdf9; padding: 10px; border-radius: 10px;">${chuong.tenChuong}</h3>`;
            
            chuong.baiList.forEach(bai => {
                htmlNoiDung += `<div class="khoi-bai-hoc">`;
                htmlNoiDung += `<h4>${bai.tenBai}</h4>`;
                
                if (bai.danhSachPhan) {
                    bai.danhSachPhan.forEach(phan => {
                        
                        // --- KIỂM TRA IF TỪNG THUỘC TÍNH ĐỂ CHIA DIỆN MẠO LINH HOẠT ---
                        
                        // 1. Nếu có Khái niệm
                        if (phan.khaiNiem) {
                            htmlNoiDung += `<div class="hop-kien-thuc khai-niem">📌 <b>Kiến thức cốt lõi:</b> ${phan.khaiNiem}</div>`;
                        }
                        
                        // 2. Nếu có Ngữ pháp (Môn Anh)
                        if (phan.nguPhap) {
                            htmlNoiDung += `<div class="hop-kien-thuc ngu-phap">📝 <b>Cấu trúc Ngữ pháp:</b><br>${phan.nguPhap}</div>`;
                        }

                        // 3. Nếu có Từ vựng (Môn Anh)
                        if (phan.tuVung) {
                            htmlNoiDung += `<div class="hop-kien-thuc ngu-phap" style="border-left-color: #00bcd4;">🔤 <b>Từ vựng mở rộng:</b><br>${phan.tuVung}</div>`;
                        }

                        // 4. Nếu có Văn mẫu / Đoạn văn phân tích (Môn Văn)
                        if (phan.vanMau) {
                            htmlNoiDung += `<div class="hop-kien-thuc van-mau">✍️ <b>Tài liệu Ngữ văn tham khảo:</b><br>${phan.vanMau}</div>`;
                        }

                        // 5. Nếu có Sự kiện (Môn Sử)
                        if (phan.suKien) {
                            htmlNoiDung += `<div class="hop-kien-thuc su-kien">⏳ <b>Sự kiện / Diễn biến:</b> ${phan.suKien}</div>`;
                        }

                        // 6. Nếu có Mẹo nhỏ / Chú ý (Áp dụng chung mọi môn nếu khai báo)
                        if (phan.meoNho) {
                            htmlNoiDung += `<div class="hop-kien-thuc ghi-chu">💡 <b>Mẹo học nhanh:</b> ${phan.meoNho}</div>`;
                        }
                        
                        // 7. Khung Ví dụ & Lời giải đóng mở mượt mà (Dành cho các bài toán/ứng dụng)
                        if (phan.deBaiViDu) {
                            htmlNoiDung += `
                                <div class="khung-vi-du" style="margin: 15px 0; padding: 15px; background: #f8f9fa; border-left: 4px solid #2d6a4f; border-radius: 6px;">
                                    <div class="de-bai-vi-du" style="font-weight: 500; color: #212529; line-height: 1.5;">
                                        <strong>📝 Ví dụ minh họa / Bài tập mẫu:</strong><br>${phan.deBaiViDu}
                                    </div>
                                    
                                    ${phan.loiGiaiViDu ? `
                                        <div class="cum-loi-giai">
                                            <button type="button" class="nut-xem-loi-giai" onclick="this.parentElement.classList.toggle('da-mo')">
                                                <span class="mui-ten">▶</span> Xem lời giải mẫu
                                            </button>
                                            <div class="vung-chuyen-dong">
                                                <div class="noi-dung-ben-trong">
                                                    <div style="margin-top: 10px; padding: 12px; background: #ffffff; border: 1px dashed #2d6a4f; border-radius: 4px; color: #333; line-height: 1.6;">
                                                        ${phan.loiGiaiViDu}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }

                        htmlNoiDung += `<br>`; 
                    });
                }
                
                // --- PHẦN LIÊN KẾT ĐẶT CUỐI BÀI ---
                if (bai.linkVideo) {
                    htmlNoiDung += `
                        <div class="khung-link-video">
                            <a href="${bai.linkVideo}" target="_blank" class="btn-video">📺 Xem Video Bài Giảng</a>
                        </div>
                    `;
                }

                if (bai.linkTaiLieuHTML) {
                    htmlNoiDung += `
                        <div class="hop-lien-ket-mo-rong">
                            🔗 <b>Tài liệu liên quan:</b> ${bai.linkTaiLieuHTML}
                        </div>
                    `;
                }
                
                htmlNoiDung += `</div>`; 
            });
        });

        document.getElementById('popup-noidung').innerHTML = htmlNoiDung;
        document.getElementById('popup-chung').style.display = 'flex';
    }

    function dongPopup() {
        document.getElementById('popup-chung').style.display = 'none';
    }
</script>
</body>
</html>
