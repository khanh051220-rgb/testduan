<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Diện Học Tập cùng Khánh</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/188/188333.png">
    <style>
        /* --- BỘ MÀU SẮC CHỦ ĐẠO --- */
        :root {
            --primary: #1b4332;
            --secondary: #40916c;
            --light: #d8f3dc;
            --bg-gradient: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
            --accent: #ff9f1c;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }

        /* --- VÙNG HIỂN THỊ CHÍNH --- */
        .container { 
            width: 95%; max-width: 1000px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: 20px;
        }

        h1 { text-align: center; color: var(--primary); font-size: 32px; margin-bottom: 10px; }
        .sub-title { text-align: center; color: var(--secondary); font-size: 16px; margin-bottom: 30px; font-style: italic; }

        /* --- TABS KHỐI LỚP --- */
        .tabs-khoi { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .btn-tab { 
            padding: 15px 35px; cursor: pointer; 
            background: linear-gradient(45deg, #2d6a4f, #52b788); 
            color: white; border: none; border-radius: 50px; 
            font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn-tab:active { transform: scale(0.95); }
        .btn-tab.active-tab { 
            background: linear-gradient(45deg, #ff9f1c, #f77f00); 
            box-shadow: 0 5px 15px rgba(247,127,0,0.4); 
        }

        /* --- LƯỚI MÔN HỌC --- */
        .vung-mon-hoc {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 20px; background: #f7fdf9; 
            border-radius: 20px; border: 1px dashed var(--secondary);
        }
        .btn-mon {
            padding: 15px; cursor: pointer; background: white;
            color: var(--primary); border: 2px solid #b7e4c7;
            border-radius: 15px; font-weight: bold; font-size: 15px;
            text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .btn-mon:hover { background: var(--light); border-color: var(--secondary); transform: translateY(-2px); }

        /* --- POPUP CHUNG VÀ CÁC THÀNH PHẦN BÊN TRONG --- */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6); display: none; 
            justify-content: center; align-items: center; z-index: 9999;
            backdrop-filter: blur(3px);
        }
        .popup-box {
            background: white; width: 90%; max-width: 950px; height: 85vh;
            border-radius: 25px; border: 3px solid var(--secondary); padding: 30px; 
            display: flex; flex-direction: column; position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .btn-close {
            position: absolute; top: 15px; right: 15px; background: #ff4d4d; 
            color: white; border: none; border-radius: 50%; width: 35px; height: 35px; 
            cursor: pointer; font-weight: bold; font-size: 16px; z-index: 10;
        }
        .btn-close:hover { background: #ff1a1a; transform: scale(1.1); }
        
        #popup-noidung { flex: 1; overflow-y: auto; padding-right: 15px; margin-top: 10px; }
        #popup-noidung::-webkit-scrollbar { width: 8px; }
        #popup-noidung::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

        /* --- CẤU TRÚC BÀI HỌC BÊN TRONG --- */
        .tieude-chuong { color: #ff9f1c; background: #fff5e6; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; text-transform: uppercase;}
        .khoi-bai-hoc { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .khoi-bai-hoc:last-child { border-bottom: none; }
        .khoi-bai-hoc h4 { color: #2d6a4f; font-size: 20px; margin-bottom: 15px; }
        
        .dong-khai-niem { font-size: 16px; line-height: 1.6; color: #333; margin-bottom: 15px; }
        .hop-meo-nho { background: #e8f5e9; padding: 15px; border-left: 5px solid #40916c; border-radius: 8px; margin: 15px 0; font-size: 15.5px;}
        
        /* Cải tiến Accordion cho Ví dụ & Lời giải (Giống ảnh 2) */
        details { background: #f4fbfa; border: 1px solid #c9ede2; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        summary { padding: 12px 15px; font-weight: bold; color: #20604b; cursor: pointer; background: #e6f7f2; user-select: none; }
        summary:hover { background: #d3f0e8; }
        .vung-vi-du { padding: 15px; border-bottom: 1px dashed #b7e4c7; }
        .hop-loi-giai { background: #fff; padding: 15px; border-radius: 8px; font-style: italic; color: #444; margin-top: 10px; border-left: 3px solid #ff9f1c;}
        
        .vung-tai-nguyen { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn-video { background: #e63946; color: white; padding: 8px 15px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .btn-link { background: #fff3cd; color: #856404; padding: 8px 15px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 13px; border: 1px solid #ffe8a1;}
    </style>
</head>
<body>

    <div class="container">
        <h1>🌿 CÂY KIẾN THỨC HỌC TẬP 🌿</h1>
        <div class="sub-title">Hệ thống bài học thông minh cùng Khánh ✨</div>
        
        <div class="tabs-khoi">
            <button class="btn-tab active-tab" id="tab-lop10" onclick="chuyenTabLop('lop10')">Khối Lớp 10</button>
            <button class="btn-tab" id="tab-lop11" onclick="chuyenTabLop('lop11')">Khối Lớp 11</button>
            <button class="btn-tab" id="tab-lop12" onclick="chuyenTabLop('lop12')">Khối Lớp 12</button>
        </div>

        <div id="vung-lop10" class="vung-lop-content">
            <div class="vung-mon-hoc">
                <div class="btn-mon" onclick="hienThiKhungPoup('toan', 'lop10')">📐 Toán Lớp 10</div>
                <div class="btn-mon" onclick="hienThiKhungPoup('van', 'lop10')">📚 Ngữ Văn 10</div>
                <div class="btn-mon">🇬🇧 Tiếng Anh 10</div>
                <div class="btn-mon">⚡ Vật Lý 10</div>
            </div>
        </div>

        <div id="vung-lop11" class="vung-lop-content" style="display: none;">
            <div class="vung-mon-hoc">
                <div class="btn-mon" onclick="hienThiKhungPoup('toan', 'lop11')">📐 Toán Lớp 11</div>
                <div class="btn-mon">📚 Ngữ Văn 11</div>
            </div>
        </div>

        <div id="vung-lop12" class="vung-lop-content" style="display: none;">
            <div class="vung-mon-hoc">
                <div class="btn-mon" onclick="hienThiKhungPoup('toan', 'lop12')">📐 Toán Lớp 12</div>
            </div>
        </div>
    </div>

    <div id="popup-chung" class="popup-overlay">
        <div class="popup-box">
            <button class="btn-close" onclick="dongPopup()">✖</button>
            <h2 id="popup-tieude" style="color: #1b4332; margin-top: 0; text-align: center; border-bottom: 2px dashed #40916c; padding-bottom: 15px;">
                </h2>
            
            <div id="popup-noidung">
                </div>
        </div>
    </div>

<script>
    /* =========================================================
       KHO DỮ LIỆU TẬP TRUNG (Khánh chỉ cần thêm/sửa chữ ở đây)
       ========================================================= */
    const khoDuLieuHocTap = {
        lop10: {
            toan: {
                tenMon: "📐 TOÁN HỌC – KHỐI LỚP 10",
                chuongList: [
                    {
                        tenChuong: "CHƯƠNG I. MỆNH ĐỀ VÀ TẬP HỢP",
                        baiList: [
                            {
                                tenBai: "Bài 1. Mệnh đề",
                                dinhNghia: "Mệnh đề toán học là một câu khẳng định có tính đúng hoặc sai rõ ràng. Một mệnh đề không thể vừa đúng vừa sai (không có chuyện 'mập mờ' nửa nọ nửa kia đâu nha).",
                                meoNho: "Những câu nghi vấn (hỏi chấm), câu cảm thán (khen/chê), hay câu cầu khiến (ra lệnh) đều bị loại từ vòng gửi xe, KHÔNG phải mệnh đề vì chẳng ai biết đường nào mà phán đúng hay sai.",
                                deBaiViDu: `Trong các câu sau, câu nào là mệnh đề? Nếu là mệnh đề thì thuộc loại nào?<br>
                                            1. "Hà Nội là thủ đô của Việt Nam."<br>
                                            2. "Số pi là một số hữu tỉ."<br>
                                            3. "Học bài đi ní!"`,
                                loiGiaiViDu: `<b>Câu 1:</b> Là mệnh đề đúng (mệnh đề xã hội).<br>
                                              <b>Câu 2:</b> Là mệnh đề toán học (sai vì pi là số vô tỉ, nhưng vẫn xác định được tính đúng/sai).<br>
                                              <b>Câu 3:</b> Không phải mệnh đề (câu ra lệnh).`,
                                linkVideo: "https://youtu.be/edVegk01ZsA",
                                linkTaiLieu: "https://vietjack.com/toan-lop-10/bai-tap-ve-menh-de.jsp"
                            },
                            {
                                tenBai: "Bài 2. Mệnh đề chứa biến",
                                dinhNghia: "Mệnh đề chứa biến là loại mệnh đề 'tùy cơ ứng biến', chưa thể khẳng định được đúng hay sai ngay lập tức. Cần phải có một giá trị cụ thể thế vào chỗ của biến (x, y, n...) thì mới biết được. Kí hiệu P(n) hoặc P(x, y).",
                                meoNho: "Cứ thấy câu nào chứa x, y, n đọc lên thấy vô tri chưa biết Đúng hay Sai, nhưng chỉ cần 'chốt hạ' thế số vào là rõ trắng đen liền — thì chính nó chứ ai!",
                                deBaiViDu: "Xét xem câu '5n chia hết cho 2' có phải mệnh đề chứa biến không? Tính đúng sai khi n = 4 và n = 5.",
                                loiGiaiViDu: `Đây chính là mệnh đề chứa biến.<br>
                                              - <b>Khi n = 4:</b> Ta được câu "20 chia hết cho 2" 👉 Mệnh đề đúng.<br>
                                              - <b>Khi n = 5:</b> Ta được câu "25 chia hết cho 2" 👉 Mệnh đề sai.`,
                                linkVideo: "", // Bỏ trống nếu chưa có video
                                linkTaiLieu: ""
                            }
                        ]
                    }
                ]
            },
            van: {
                tenMon: "📚 NGỮ VĂN – KHỐI LỚP 10",
                chuongList: [
                    {
                        tenChuong: "CHUYÊN ĐỀ 1: THƠ ĐƯỜNG LUẬT",
                        baiList: [
                            {
                                tenBai: "Bài 1. Giới thiệu thơ Đường",
                                dinhNghia: "Thơ Đường luật là thể thơ xuất hiện từ thời nhà Đường (Trung Quốc), có luật lệ nghiêm ngặt về niêm, luật, vần, đối.",
                                meoNho: "Nhớ công thức: 'Nhất tam ngũ bất luận, nhị tứ lục phân minh' để kiểm tra luật Bằng Trắc.",
                                deBaiViDu: "Chỉ ra luật Bằng Trắc trong câu đầu bài Cảm Xúc Mùa Thu của Đỗ Phủ.",
                                loiGiaiViDu: "Câu thơ: 'Ngọc lộ điêu thương phong thụ lâm'. Phân tích các chữ thứ 2, 4, 6...",
                                linkVideo: "",
                                linkTaiLieu: ""
                            }
                        ]
                    }
                ]
            }
        },
        lop11: {
            toan: {
                tenMon: "📐 TOÁN HỌC – KHỐI LỚP 11",
                chuongList: [
                    {
                        tenChuong: "CHƯƠNG I. HÀM SỐ LƯỢNG GIÁC",
                        baiList: [
                            {
                                tenBai: "Bài 1. Hàm số Sin và Cos",
                                dinhNghia: "Hàm số lượng giác là hàm số tuần hoàn...",
                                meoNho: "Sin đi học, Cos khóc hoài...",
                                deBaiViDu: "Tìm tập xác định của hàm số y = sin(x)",
                                loiGiaiViDu: "Tập xác định D = R.",
                                linkVideo: "", linkTaiLieu: ""
                            }
                        ]
                    }
                ]
            }
        }
        // Cậu cứ thêm các lớp và các môn tiếp theo vào đây nhé!
    };

    /* =========================================================
       HỆ THỐNG VẬN HÀNH BẰNG JAVASCRIPT
       ========================================================= */

    // 1. Hàm chuyển tab Khối Lớp (Giữ nguyên của cậu)
    function chuyenTabLop(tenLop) {
        document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active-tab'));
        document.getElementById('tab-' + tenLop).classList.add('active-tab');

        document.querySelectorAll('.vung-lop-content').forEach(vung => vung.style.display = 'none');
        document.getElementById('vung-' + tenLop).style.display = 'block';
    }

    // 2. Hàm thông minh: Lấy dữ liệu và bơm vào Popup
    function hienThiKhungPoup(maMon, maLop) {
        // Kiểm tra xem trong kho đã soạn bài cho môn này lớp này chưa
        if (!khoDuLieuHocTap[maLop] || !khoDuLieuHocTap[maLop][maMon]) {
            alert("Đang soạn thảo môn học này, cậu quay lại sau nhé! 🛠️");
            return;
        }

        const duLieuMon = khoDuLieuHocTap[maLop][maMon];
        
        // Cập nhật tiêu đề Popup
        document.getElementById('popup-tieude').innerHTML = duLieuMon.tenMon;

        // Bắt đầu xây dựng mã HTML cho phần nội dung
        let htmlNoiDung = '';

        duLieuMon.chuongList.forEach(chuong => {
            htmlNoiDung += `<h3 class="tieude-chuong">${chuong.tenChuong}</h3>`;
            
            chuong.baiList.forEach(bai => {
                htmlNoiDung += `
                    <div class="khoi-bai-hoc">
                        <h4>${bai.tenBai}</h4>
                        <div class="dong-khai-niem">📌 <b>Khái niệm:</b> ${bai.dinhNghia}</div>
                        
                        <div class="hop-meo-nho">
                            💡 <b>Mẹo hệ thống:</b> ${bai.meoNho}
                        </div>

                        <details>
                            <summary>▶ 📝 Xem Ví dụ mẫu & Lời giải</summary>
                            <div class="vung-vi-du"><b>Đề bài:</b><br>${bai.deBaiViDu}</div>
                            <div class="hop-loi-giai">👉 <b>Lời giải:</b><br>${bai.loiGiaiViDu}</div>
                        </details>
                        
                        <div class="vung-tai-nguyen">
                            ${bai.linkVideo ? `<a href="${bai.linkVideo}" target="_blank" class="btn-video">📺 Video Bài Giảng</a>` : ''}
                            ${bai.linkTaiLieu ? `<a href="${bai.linkTaiLieu}" target="_blank" class="btn-link">📄 Tải Tài Liệu</a>` : ''}
                        </div>
                    </div>
                `;
            });
        });

        // Bơm mã HTML đã tạo vào khung và hiển thị lên
        document.getElementById('popup-noidung').innerHTML = htmlNoiDung;
        document.getElementById('popup-chung').style.display = 'flex';
    }

    // 3. Hàm đóng Popup
    function dongPopup() {
        document.getElementById('popup-chung').style.display = 'none';
    }
</script>
</body>
</html>
